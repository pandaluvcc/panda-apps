# /data/docker/openresty/nginx/conf.d/default.conf
# Panda Apps 聚合项目配置
# 前端部署在 /panda-apps/ 子目录

server {
    listen 80;
    server_name _;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 根路径直接返回前端应用
    location = / {
        root /usr/share/nginx/html/panda-apps;
        index index.html;
        try_files /index.html =404;
    }

    # panda-apps 前端（Vue Router History 模式）
    location /panda-apps/ {
        alias /usr/share/nginx/html/panda-apps/;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        try_files $uri $uri/ /panda-apps/index.html;
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://panda-apps:9090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
