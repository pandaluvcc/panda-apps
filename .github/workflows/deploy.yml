name: Deploy to Server

on:
  # 标签触发：推送 v* 标签时自动部署（部署全部）
  push:
    tags:
      - 'v*'

  # 手动触发：在 GitHub Actions 页面点击运行（可选择部署内容）
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: '部署后端'
        required: true
        default: true
        type: boolean
      deploy_frontend:
        description: '部署前端'
        required: true
        default: true
        type: boolean
      upload_lib:
        description: '强制上传 lib 目录'
        required: false
        default: false
        type: boolean
      version:
        description: '版本号（可选）'
        required: false
        type: string

env:
  BACKEND_DEPLOY_PATH: /data/docker/platform/panda-apps
  FRONTEND_DEPLOY_PATH: /data/docker/openresty/nginx/content/panda-apps
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ==================== 决定部署内容 ====================
      - name: Determine what to deploy
        id: deploy-decision
        run: |
          # 标签触发时部署全部（标签代表正式发布）
          if [ "${{ github.event_name }}" = "push" ]; then
            DEPLOY_BACKEND="true"
            DEPLOY_FRONTEND="true"
            echo "📦 标签触发部署，部署全部内容"
          else
            # 手动触发时使用用户选择
            DEPLOY_BACKEND="${{ inputs.deploy_backend }}"
            DEPLOY_FRONTEND="${{ inputs.deploy_frontend }}"
            echo "🎯 手动触发部署，后端: $DEPLOY_BACKEND, 前端: $DEPLOY_FRONTEND"
          fi

          echo "deploy_backend=$DEPLOY_BACKEND" >> $GITHUB_OUTPUT
          echo "deploy_frontend=$DEPLOY_FRONTEND" >> $GITHUB_OUTPUT

      # ==================== 构建后端 ====================
      - name: Set up JDK 17
        if: ${{ steps.deploy-decision.outputs.deploy_backend == 'true' }}
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        if: ${{ steps.deploy-decision.outputs.deploy_backend == 'true' }}
        run: mvn clean package -DskipTests

      # ==================== 构建前端 ====================
      - name: Setup Node.js
        if: ${{ steps.deploy-decision.outputs.deploy_frontend == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: ${{ steps.deploy-decision.outputs.deploy_frontend == 'true' }}
        run: |
          cd frontend
          npm install

      - name: Build frontend
        if: ${{ steps.deploy-decision.outputs.deploy_frontend == 'true' }}
        run: |
          cd frontend
          npm run build

      # ==================== 配置 SSH ====================
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # ==================== 部署后端 ====================
      - name: Upload backend JAR to server
        if: ${{ steps.deploy-decision.outputs.deploy_backend == 'true' }}
        run: |
          # 备份旧 JAR 包
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "if [ -f ${{ env.BACKEND_DEPLOY_PATH }}/panda-api-1.0.0-SNAPSHOT.jar ]; then mv ${{ env.BACKEND_DEPLOY_PATH }}/panda-api-1.0.0-SNAPSHOT.jar ${{ env.BACKEND_DEPLOY_PATH }}/panda-api-1.0.0-SNAPSHOT.jar-back\$(date +%Y%m%d%H%M%S); fi"

          # 上传 JAR 包
          scp panda-api/target/panda-api-1.0.0-SNAPSHOT.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.BACKEND_DEPLOY_PATH }}/

      - name: Sync lib directory to server (incremental)
        if: ${{ steps.deploy-decision.outputs.deploy_backend == 'true' }}
        run: |
          # 使用 rsync 增量同步 lib 目录
          if [ "${{ inputs.upload_lib }}" = "true" ]; then
            echo "📤 强制上传整个 lib 目录..."
            rsync -avz --delete panda-api/target/lib/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.BACKEND_DEPLOY_PATH }}/lib/
          else
            echo "📤 增量同步 lib 目录..."
            rsync -avz --ignore-existing --size-only panda-api/target/lib/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.BACKEND_DEPLOY_PATH }}/lib/
          fi

      - name: Deploy backend on server
        if: ${{ steps.deploy-decision.outputs.deploy_backend == 'true' }}
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ${{ env.BACKEND_DEPLOY_PATH }}
            chmod +x deploy.sh
            ./deploy.sh restart
            echo "✅ 后端部署完成"
          EOF

      # ==================== 部署前端 ====================
      - name: Package frontend
        if: ${{ steps.deploy-decision.outputs.deploy_frontend == 'true' }}
        run: |
          cd frontend
          tar -czf ../frontend-dist.tar.gz -C dist .

      - name: Upload frontend to server
        if: ${{ steps.deploy-decision.outputs.deploy_frontend == 'true' }}
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "if [ -d '${{ env.FRONTEND_DEPLOY_PATH }}' ] && [ \"\$(ls -A ${{ env.FRONTEND_DEPLOY_PATH }} 2>/dev/null)\" ]; then mv ${{ env.FRONTEND_DEPLOY_PATH }} ${{ env.FRONTEND_DEPLOY_PATH }}_backup_\$(date +%Y%m%d%H%M%S); fi"
          scp frontend-dist.tar.gz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ${{ env.FRONTEND_DEPLOY_PATH }} && cd ${{ env.FRONTEND_DEPLOY_PATH }} && tar -xzf /tmp/frontend-dist.tar.gz && rm /tmp/frontend-dist.tar.gz"
          echo "✅ 前端部署完成"

      # ==================== 健康检查 ====================
      - name: Health check
        if: ${{ steps.deploy-decision.outputs.deploy_backend == 'true' }}
        run: |
          echo "⏳ 等待服务启动..."
          sleep 10
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            docker ps --filter "name=panda-apps" --format "table {{.Names}}\t{{.Status}}"
            cd ${{ env.BACKEND_DEPLOY_PATH }}
            docker compose logs --tail=20 panda-apps
          EOF

      # ==================== 上传构建产物 ====================
      - name: Upload backend artifact
        if: ${{ steps.deploy-decision.outputs.deploy_backend == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: panda-api/target/*.jar
          retention-days: 7

      - name: Upload frontend artifact
        if: ${{ steps.deploy-decision.outputs.deploy_frontend == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
