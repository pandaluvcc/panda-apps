# application-prod.yml - 生产环境配置
server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/grid_trading?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: grid_user
    password: ${MYSQL_PASSWORD:GridTrading@2026}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    com.panda.gridtrading: INFO
    org.hibernate.SQL: WARN

baidu:
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:44973625}
    api-key: ${BAIDU_OCR_API_KEY:1ixcXpfDZIEwXgup6GuYz6uP}
    secret-key: ${BAIDU_OCR_SECRET_KEY:Uu6E8mHt9yscUKYfLE7zBqD7l3N96Aa7}

ocr:
  match:
    tolerance-percent: 0.005
    time-window-seconds: 30

