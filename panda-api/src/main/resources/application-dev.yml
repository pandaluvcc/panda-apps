# 开发环境配置 - 使用 H2 内存数据库

spring:
  datasource:
    url: jdbc:h2:mem:panda_apps;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（访问 http://localhost:8080/h2-console）
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  # 自动创建数据库 schema
  sql:
    init:
      mode: always

# 开发环境详细日志
logging:
  level:
    com.panda: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
