# 生产环境配置 - 使用 MySQL
server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# 百度 OCR 配置
baidu:
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:44973625}
    api-key: ${BAIDU_OCR_API_KEY:1ixcXpfDZIEwXgup6GuYz6uP}
    secret-key: ${BAIDU_OCR_SECRET_KEY:Uu6E8mHt9yscUKYfLE7zBqD7l3N96Aa7}

# OCR 匹配配置
ocr:
  match:
    tolerance-percent: 0.005
    time-window-seconds: 30

# 生产环境日志配置 - 按日期切割
logging:
  level:
    com.panda: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/app.log
  logback:
    rolling-policy:
      file-name-pattern: logs/app_%d{yyyyMMdd}.log
      max-history: 30
      total-size-cap: 1GB
