# application-prod.yml - 生产环境配置
server:
  port: 9090

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# 百度 OCR 配置
baidu:
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:44973625}
    api-key: ${BAIDU_OCR_API_KEY:1ixcXpfDZIEwXgup6GuYz6uP}
    secret-key: ${BAIDU_OCR_SECRET_KEY:Uu6E8mHt9yscUKYfLE7zBqD7l3N96Aa7}

# OCR 匹配配置
ocr:
  match:
    tolerance-percent: 0.005
    time-window-seconds: 30

logging:
  level:
    com.panda: INFO
    org.hibernate.SQL: WARN
