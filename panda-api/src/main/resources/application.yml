server:
  port: 8080

spring:
  application:
    name: panda-apps

  # H2 内存数据库（开发环境）
  datasource:
    url: jdbc:h2:mem:panda_apps;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（访问 http://localhost:8080/h2-console）
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# 百度 OCR 配置
baidu:
  ocr:
    app-id: ${BAIDU_OCR_APP_ID:44973625}
    api-key: ${BAIDU_OCR_API_KEY:1ixcXpfDZIEwXgup6GuYz6uP}
    secret-key: ${BAIDU_OCR_SECRET_KEY:Uu6E8mHt9yscUKYfLE7zBqD7l3N96Aa7}

# OCR 匹配配置
ocr:
  match:
    tolerance-percent: 0.005
    time-window-seconds: 30

# 日志配置（开发环境详细日志）
logging:
  level:
    com.panda: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN